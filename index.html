<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Browser v1</title>
  <style>
    /* ─── 変数定義 ─── */
    :root {
      --shell-bg:    #1c1b22; --tabbar-bg:   #1c1b22; --tab-idle:    #2b2a33;
      --tab-hover:   #3a3944; --tab-active:  #42414d; --toolbar-bg:  #42414d;
      --border:      rgba(255,255,255,0.08); --text-main:   #f0f0f0;
      --text-muted:  #aaa; --text-dim:    #666; --accent:      #8c82ff;
      --urlbar-bg:   #1c1b22; --ntpage-bg:   #1c1b22; --shortcut-bg: #2b2a33;
      --search-bg:   #2b2a33; --console-bg:  #181818;
      --font-size-main: 13px; --font-size-small: 12px;
    }
    :root.theme-light {
      --shell-bg:    #e9e9ed; --tabbar-bg:   #e9e9ed; --tab-idle:    #f5f5f7;
      --tab-hover:   #e0e0e6; --tab-active:  #ffffff; --toolbar-bg:  #ffffff;
      --border:      rgba(0,0,0,0.1); --text-main:   #222;
      --text-muted:  #666; --text-dim:    #999; --accent:      #5a4fff;
      --urlbar-bg:   #e9e9ed; --ntpage-bg:   #f5f5f7; --shortcut-bg: #e9e9ed;
      --search-bg:   #e9e9ed; --console-bg:  #f0f0f0;
    }
    body[data-font-size="small"] { --font-size-main: 12px; --font-size-small: 11px; }
    body[data-font-size="large"] { --font-size-main: 14px; --font-size-small: 13px; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; height: 100dvh; overflow: hidden; position: fixed;
      width: 100%; top: 0; left: 0; background: var(--shell-bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text-main); font-size: var(--font-size-main);
    }

    /* ─── 基本レイアウト ─── */
    #browser {
      display: flex; flex-direction: column; height: 100%;
      width: 100%; position: relative; overflow: hidden;
    }
    #main-panel {
      display: flex; flex-direction: column; flex: 1; min-width: 0;
    }

    /* ─── 水平タブバー (デフォルト) ─── */
    #tab-bar {
      display: flex; align-items: flex-end; background: var(--tabbar-bg);
      padding: 8px 8px 0; gap: 2px; min-height: 46px;
      overflow-x: auto; overflow-y: visible; scrollbar-width: none; flex-shrink: 0;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center; gap: 7px; padding: 7px 10px 9px;
      min-width: 130px; max-width: 220px; height: 36px;
      background: var(--tab-idle); border-radius: 8px 8px 0 0;
      cursor: pointer; font-size: var(--font-size-small); color: var(--text-muted);
      user-select: none; position: relative; flex-shrink: 0;
      transition: background 0.12s, color 0.12s; border: 0.5px solid var(--border);
      border-bottom: none;
    }
    .tab:hover { background: var(--tab-hover); color: var(--text-main); }
    .tab.active { background: var(--tab-active); color: var(--text-main); z-index: 2; }
    .tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px; background: var(--tab-active);
    }
    .tab-favicon { font-size: var(--font-size-main); flex-shrink: 0; }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── 垂直タブバー (切り替え用) ─── */
    body.layout-vertical #browser { flex-direction: row; }
    body.layout-vertical #tab-bar {
      flex-direction: column; width: 240px; height: 100%;
      align-items: stretch; padding: 8px; border-right: 1px solid var(--border);
    }
    body.layout-vertical .tab {
      max-width: none; min-width: 0; border-radius: 8px; border-bottom: 0.5px solid var(--border);
    }
    body.layout-vertical .tab.active::after { display: none; } /* 不要なので消す */

    .tab-close {
      width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 14px; color: var(--text-dim); cursor: pointer;
      flex-shrink: 0; transition: background 0.1s, color 0.1s; line-height: 1;
    }
    .tab-close:hover { background: rgba(0,0,0,0.1); color: var(--text-main); }
    #new-tab-btn {
      width: 30px; height: 28px; background: transparent; border: none; border-radius: 50%;
      color: var(--text-muted); font-size: 22px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: background 0.1s, color 0.1s;
      align-self: center; margin-bottom: 4px; line-height: 1;
    }
    #new-tab-btn:hover { background: rgba(0,0,0,0.1); color: var(--text-main); }
    body.layout-vertical #new-tab-btn { width: 100%; height: 36px; margin-top: 4px; margin-bottom: 0; }

    /* ─── ツールバー ─── */
    #toolbar {
      background: var(--toolbar-bg); padding: 6px 10px; display: flex;
      align-items: center; gap: 6px; border-bottom: 1px solid rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .nav-btn {
      width: 30px; height: 30px; background: transparent; border: none; border-radius: 50%;
      color: var(--text-main); font-size: 16px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: background 0.1s; flex-shrink: 0;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(0,0,0,0.08); }
    .nav-btn:disabled { color: var(--text-dim); cursor: default; }
    #url-bar-wrap { flex: 1; position: relative; display: flex; align-items: center; }
    #url-bar {
      width: 100%; height: 32px; background: var(--urlbar-bg);
      border: 1.5px solid var(--border); border-radius: 16px; padding: 0 36px 0 36px;
      color: var(--text-main); font-size: var(--font-size-main); font-family: inherit;
      outline: none; transition: border-color 0.15s, background 0.15s;
    }
    #url-bar:focus { border-color: var(--accent); background: color-mix(in srgb, var(--urlbar-bg) 80%, var(--accent)); }
    #url-bar-lock { position: absolute; left: 12px; font-size: var(--font-size-main); color: var(--text-dim); pointer-events: none; }
    #url-bar-go {
      position: absolute; right: 8px; background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 16px; padding: 0; transition: color 0.1s;
    }
    #url-bar-go:hover { color: var(--accent); }

    /* ─── コンテンツエリア ─── */
    #content-area { flex: 1; position: relative; overflow: hidden; background: var(--shell-bg); }
    .page-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
    .page-frame.active { display: block; }
    #loading-bar {
      position: absolute; top: 0; left: 0; height: 3px; background: var(--accent);
      border-radius: 0 2px 2px 0; z-index: 100; width: 0%;
      transition: width 0.25s ease; pointer-events: none;
    }

    /* ─── 新規タブページ ─── */
    .nt-page {
      position: absolute; inset: 0; background: var(--ntpage-bg); display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 28px;
    }
    .nt-page.active { display: flex; }
    .nt-heading { font-size: 22px; font-weight: 400; color: var(--text-muted); letter-spacing: 0.02em; }
    .nt-search-wrap { position: relative; width: 360px; }
    .nt-search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 16px; color: var(--text-dim); pointer-events: none;
    }
    .nt-search {
      width: 100%; height: 46px; background: var(--search-bg); border: 1.5px solid var(--border);
      border-radius: 23px; padding: 0 18px 0 42px; color: var(--text-main);
      font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s, background 0.15s;
    }
    .nt-search:focus { border-color: var(--accent); background: color-mix(in srgb, var(--search-bg) 80%, var(--accent)); }
    .nt-hint { font-size: 11px; color: var(--text-dim); margin-top: -16px; }
    .shortcuts { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
    .shortcut { display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; opacity: 0.72; transition: opacity 0.15s, transform 0.15s; width: 80px; }
    .shortcut:hover { opacity: 1; transform: translateY(-2px); }
    .shortcut-icon {
      width: 56px; height: 56px; background: var(--shortcut-bg); border-radius: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      border: 0.5px solid var(--border); transition: background 0.15s;
    }
    .shortcut:hover .shortcut-icon { background: var(--tab-hover); }
    .shortcut-label {
      font-size: 11px; color: var(--text-dim); text-align: center; width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ─── 設定パネル ─── */
    #settings-panel {
      position: absolute; top: 0; right: 0; width: 300px; height: 100%;
      background: var(--shell-bg); border-left: 1px solid var(--border);
      z-index: 300; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.25s ease-in-out;
    }
    #settings-panel.active { transform: translateX(0); }
    .settings-header {
      padding: 10px 15px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .settings-title { font-weight: bold; font-size: 14px; }
    .settings-close { font-size: 20px; cursor: pointer; color: var(--text-dim); }
    .settings-close:hover { color: var(--text-main); }
    .settings-body { flex: 1; overflow-y: auto; padding: 20px 15px; }
    .setting-group { margin-bottom: 24px; }
    .setting-group-title { font-weight: bold; font-size: 12px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
    .setting-option { display: flex; flex-direction: column; gap: 8px; }
    .setting-option label { display: flex; align-items: center; gap: 8px; font-size: var(--font-size-main); cursor: pointer; }
    .setting-option select {
      width: 100%; padding: 6px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--urlbar-bg); color: var(--text-main); font-family: inherit;
    }

    /* ─── コマンドライン ─── */
    #console-panel {
      position: absolute; bottom: 0; left: 0; right: 0; height: 220px; background: var(--console-bg);
      border-top: 2px solid #333; display: none; flex-direction: column;
      font-family: 'Courier New', Courier, monospace; color: #00ff66; flex-shrink: 0; z-index: 200;
    }
    #console-panel.active { display: flex; }
    /* (以下、既存のコマンドラインCSSは省略) */
    .theme-light #console-panel { border-top-color: #ccc; }
    .theme-light #console-header { background: #ddd; border-bottom-color: #ccc; color: #555; }
    .theme-light #console-close { color: #777; }
    .theme-light #console-close:hover { color: #000; }
    .theme-light #console-body { color: #008822; }
    .theme-light #console-footer { background: #e0e0e0; border-top-color: #ccc; }
    .theme-light #console-prompt { color: #008822; }
    .theme-light #console-input { color: #111; }
    .theme-light #console-run-btn { background: #ccc; color: #333; }
    .theme-light #console-run-btn:hover { background: #bbb; color: #000; }
    #console-header{background:#222;padding:6px 12px;font-size:11px;color:#aaa;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}#console-title{font-weight:700}#console-close{cursor:pointer;font-size:14px;color:#888}#console-close:hover{color:#fff}#console-body{flex:1;padding:10px;overflow-y:auto;font-size:12px;line-height:1.4;white-space:pre-wrap}#console-footer{display:flex;border-top:1px solid #333;background:#1e1e1e}#console-prompt{padding:8px 6px 8px 12px;color:#00ff66;font-size:13px;user-select:none}#console-input{flex:1;background:transparent;border:none;color:#fff;padding:8px 4px;font-family:inherit;font-size:13px;outline:0}#console-run-btn{background:#333;border:none;color:#ccc;padding:0 16px;cursor:pointer;font-family:inherit;font-size:12px;transition:background .1s,color .1s}#console-run-btn:hover{background:#444;color:#fff}

    /* (エラーページCSSは省略) */
    .error-page{position:absolute;inset:0;background:#1c1b22;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text-muted);text-align:center;padding:40px}.error-page.active{display:flex}.error-page .err-icon{font-size:48px;opacity:.4}.error-page .err-title{font-size:20px;color:#ddd}.error-page .err-desc{font-size:13px;line-height:1.6;max-width:400px;color:#888}.error-page .err-retry{margin-top:8px;padding:8px 20px;background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:20px;color:#ccc;font-size:13px;cursor:pointer;transition:background .12s;font-family:inherit}.error-page .err-retry:hover{background:rgba(255,255,255,.08)}
  </style>
</head>
<body>

<div id="browser" role="application">

  <div id="tab-bar" role="tablist">
    <button id="new-tab-btn" title="新しいタブ">+</button>
  </div>

  <div id="main-panel">
    <div id="toolbar">
      <button class="nav-btn" id="btn-back" disabled>&#8592;</button>
      <button class="nav-btn" id="btn-fwd" disabled>&#8594;</button>
      <button class="nav-btn" id="btn-reload">&#8635;</button>
      <div id="url-bar-wrap">
        <span id="url-bar-lock">🔒</span>
        <input id="url-bar" type="text" autocomplete="off" spellcheck="false" />
      </div>
      <button class="nav-btn" id="btn-console" title="開発コンソール">&#128295;</button>
      <button class="nav-btn" id="btn-settings" title="設定">&#9881;</button>
    </div>

    <div id="content-area" role="main">
      <div id="loading-bar"></div>
    </div>
  </div>
</div>

<!-- 設定パネル -->
<div id="settings-panel">
  <div class="settings-header">
    <span class="settings-title" data-i18n="settings.title">設定</span>
    <span class="settings-close">&times;</span>
  </div>
  <div class="settings-body">
    <div class="setting-group">
      <div class="setting-group-title" data-i18n="settings.theme.title">テーマ</div>
      <div class="setting-option">
        <label><input type="radio" name="theme" value="dark" checked> <span data-i18n="settings.theme.dark">ダーク</span></label>
        <label><input type="radio" name="theme" value="light"> <span data-i18n="settings.theme.light">ライト</span></label>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-group-title" data-i18n="settings.layout.title">タブバーの配置</div>
      <div class="setting-option">
        <label><input type="radio" name="tab-layout" value="horizontal" checked> <span data-i18n="settings.layout.horizontal">水平 (上)</span></label>
        <label><input type="radio" name="tab-layout" value="vertical"> <span data-i18n="settings.layout.vertical">垂直 (左)</span></label>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-group-title" data-i18n="settings.language.title">言語</div>
      <div class="setting-option">
        <select id="language-select">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-group-title" data-i18n="settings.fontsize.title">文字の大きさ</div>
      <div class="setting-option">
        <label><input type="radio" name="font-size" value="small"> <span data-i18n="settings.fontsize.small">小</span></label>
        <label><input type="radio" name="font-size" value="medium" checked> <span data-i18n="settings.fontsize.medium">中</span></label>
        <label><input type="radio" name="font-size" value="large"> <span data-i18n="settings.fontsize.large">大</span></label>
      </div>
    </div>
  </div>
</div>

<!-- コマンドコンソール -->
<div id="console-panel">
  <div class="settings-header">
    <span class="settings-title">出力結果</span>
    <span class="settings-close">&times;</span>
  </div>
  <div id="console-body"></div>
  <div id="console-footer">
    <span id="console-prompt">&gt;</span>
    <input id="console-input" type="text" autocomplete="off" spellcheck="false" />
    <button id="console-run-btn">実行</button>
  </div>
</div>

<script>
(function () {
  'use strict';
  
  const BROWSER_VERSION = 'v1';

  /* (既存のDOM参照) */
  const DOMElements = {
    body: document.body,
    tabBar: document.getElementById('tab-bar'),
    newTabBtn: document.getElementById('new-tab-btn'),
    contentEl: document.getElementById('content-area'),
    urlBar: document.getElementById('url-bar'),
    urlLock: document.getElementById('url-bar-lock'),
    btnBack: document.getElementById('btn-back'),
    btnFwd: document.getElementById('btn-fwd'),
    btnReload: document.getElementById('btn-reload'),
    loadingBar: document.getElementById('loading-bar'),
    btnConsole: document.getElementById('btn-console'),
    consolePanel: document.getElementById('console-panel'),
    consoleBody: document.getElementById('console-body'),
    consoleInput: document.getElementById('console-input'),
    consoleRun: document.getElementById('console-run-btn'),
    btnSettings: document.getElementById('btn-settings'),
    settingsPanel: document.getElementById('settings-panel'),
  };

  /* (既存のState) */
  let tabs = [], activeId = null, idCounter = 0;

  // ─── 設定管理 ────────────────────────────────────────────────────────
  const I18N = { // 国際化対応テキスト
    ja: { 'settings.title': '設定', 'settings.theme.title': 'テーマ', 'settings.theme.dark': 'ダーク', 'settings.theme.light': 'ライト', 'settings.layout.title': 'タブバーの配置', 'settings.layout.horizontal': '水平 (上)', 'settings.layout.vertical': '垂直 (左)', 'settings.language.title': '言語', 'settings.fontsize.title': '文字の大きさ', 'settings.fontsize.small': '小', 'settings.fontsize.medium': '中', 'settings.fontsize.large': '大' },
    en: { 'settings.title': 'Settings', 'settings.theme.title': 'Theme', 'settings.theme.dark': 'Dark', 'settings.theme.light': 'Light', 'settings.layout.title': 'Tab Bar Layout', 'settings.layout.horizontal': 'Horizontal (Top)', 'settings.layout.vertical': 'Vertical (Left)', 'settings.language.title': 'Language', 'settings.fontsize.title': 'Font Size', 'settings.fontsize.small': 'Small', 'settings.fontsize.medium': 'Medium', 'settings.fontsize.large': 'Large' }
  };

  let settings = {
    theme: 'dark', tabLayout: 'horizontal', language: 'ja', fontSize: 'medium'
  };

  function applySettings() {
    // テーマ
    DOMElements.body.classList.toggle('theme-light', settings.theme === 'light');
    // タブレイアウト
    DOMElements.body.classList.toggle('layout-vertical', settings.tabLayout === 'vertical');
    // 言語
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      el.textContent = I18N[settings.language][key] || key;
    });
    // フォントサイズ
    DOMElements.body.dataset.fontSize = settings.fontSize;
  }

  function saveSettings() {
    localStorage.setItem('my_browser_settings', JSON.stringify(settings));
  }

  function loadSettings() {
    const saved = localStorage.getItem('my_browser_settings');
    if (saved) {
      settings = { ...settings, ...JSON.parse(saved) };
    }
    // UIに設定を反映
    document.querySelector(`input[name="theme"][value="${settings.theme}"]`).checked = true;
    document.querySelector(`input[name="tab-layout"][value="${settings.tabLayout}"]`).checked = true;
    document.getElementById('language-select').value = settings.language;
    document.querySelector(`input[name="font-size"][value="${settings.fontSize}"]`).checked = true;
    
    applySettings();
  }
  
  // ─── コマンドライン ───────────────────────────────────────────────────────
  function writeToConsole(text, isError = false) { /* (変更なし) */
    const span=document.createElement("div");span.style.color=isError?"#ff3333":"#00ff66",span.textContent=text,DOMElements.consoleBody.appendChild(span),DOMElements.consoleBody.scrollTop=DOMElements.consoleBody.scrollHeight
  }

  function executeCommand(input) {
    const cmd = input.trim().toLowerCase(); // ★小文字に変換
    if (!cmd) return;
    writeToConsole(`> ${input}`); // 表示は元の入力のまま

    if (cmd === 'this web in my book') {
        /* (ブックマーク機能 - 変更なし) */
        const activeTab=tabs.find(t=>t.id===activeId);if(!activeTab||!activeTab.url)return void writeToConsole("エラー: 現在有効なWebページが開かれていません。",!0);const bookmarks=getBookmarks();if(bookmarks.some(b=>b.url===activeTab.url))return void writeToConsole(`案内: すでに登録されています: ${activeTab.title}`);bookmarks.push({label:activeTab.title,url:activeTab.url,icon:getFavicon(activeTab.url)}),saveBookmarks(bookmarks),DOMElements.contentEl.querySelectorAll(".nt-page").forEach(page=>{const tid=+page.getAttribute("data-tabid");renderShortcuts(page,tid)}),writeToConsole(`成功: お気に入りに追加しました: "${activeTab.title}"`)
    } else if (cmd === 'view-source') {
        /* (ソース表示機能 - 変更なし) */
        const activeTab=tabs.find(t=>t.id===activeId);if(!activeTab||!activeTab.url)return void writeToConsole("エラー: 開いているWebページがありません。",!0);const iframe=DOMElements.contentEl.querySelector(`iframe[data-tabid="${activeId}"]`);if(!iframe)return void writeToConsole("エラー: ソースを取得可能なフレームが存在しません。",!0);try{if(iframe.contentDocument&&iframe.contentDocument.documentElement){const htmlCode=iframe.contentDocument.documentElement.outerHTML;writeToConsole(`--- ${activeTab.url} のコード ---`),writeToConsole(htmlCode),writeToConsole("--- コード表示終了 ---")}else throw new Error("CORS restriction")}catch(e){writeToConsole(`[セキュリティ制限(CORS)により取得不可]\n現在のWebページ (${activeTab.url}) は外部ドメインであるため、ブラウザのセキュリティ仕様により中身のコードをJavaScriptで直接覗き見ることができません。`,!0)}
    } else if (cmd === 'this browser-version') {
        writeToConsole(`Browser Version: ${BROWSER_VERSION}`);
    } else if (cmd === 'clear') {
        DOMElements.consoleBody.innerHTML = '';
    } else if (cmd === 'help command ? -a') {

  }

  // ─── イベントリスナー ────────────────────────────────────────────────────────
  DOMElements.newTabBtn.addEventListener('click', () => openTab(null));
  DOMElements.urlBar.addEventListener('keydown', e => { if (e.key === 'Enter') navigateTo(activeId, normalise(DOMElements.urlBar.value)); });
  DOMElements.btnBack.addEventListener('click',   () => historyGo(-1));
  DOMElements.btnFwd.addEventListener('click',    () => historyGo(+1));
  DOMElements.btnReload.addEventListener('click', () => {
    const iframe = DOMElements.contentEl.querySelector(`iframe[data-tabid="${activeId}"]`);
    if (iframe) { startLoading(); iframe.src = iframe.src; }
  });

  // 設定パネルのリスナー
  DOMElements.btnSettings.addEventListener('click', () => DOMElements.settingsPanel.classList.toggle('active'));
  DOMElements.settingsPanel.querySelector('.settings-close').addEventListener('click', () => DOMElements.settingsPanel.classList.remove('active'));
  DOMElements.settingsPanel.addEventListener('change', e => {
    const { name, value, type, checked } = e.target;
    if (type === 'radio' && !checked) return;
    if (name === 'theme') settings.theme = value;
    if (name === 'tab-layout') settings.tabLayout = value;
    if (name === 'font-size') settings.fontSize = value;
    if (e.target.id === 'language-select') settings.language = value;
    saveSettings();
    applySettings();
  });
  
  // コンソールパネルのリスナー
  DOMElements.btnConsole.addEventListener('click', () => {
    DOMElements.consolePanel.classList.toggle('active');
    if (DOMElements.consolePanel.classList.contains('active')) DOMElements.consoleInput.focus();
  });
  DOMElements.consolePanel.querySelector('.settings-close').addEventListener('click', () => DOMElements.consolePanel.classList.remove('active'));
  DOMElements.consoleInput.addEventListener('keydown', e => { if (e.key === 'Enter') executeCommand(DOMElements.consoleInput.value); });
  DOMElements.consoleRun.addEventListener('click', () => executeCommand(DOMElements.consoleInput.value));

  // ─── 初期化 ───────────────────────────────────────────────────────────────
  loadSettings();
  openTab('https://ja.wikipedia.org');

})();
